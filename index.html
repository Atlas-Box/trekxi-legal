<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trekxi — Documents légaux / Legal documents</title>
<meta name="description" content="Documents légaux de l'application Trekxi : politique de confidentialité et conditions d'utilisation.">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a2035;
    --primary: #00BFA6;
    --primary-light: #2DD4BF;
    --text: #ffffff;
    --text2: rgba(255,255,255,0.72);
    --text3: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text2);
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
    line-height: 1.7; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .container { max-width: 480px; width: 100%; text-align: center; }
  h1 {
    color: var(--text); font-size: 36px; font-weight: 800;
    margin-bottom: 8px; letter-spacing: -0.02em;
  }
  h1 span { color: var(--primary); }
  .tagline { color: var(--text3); font-size: 14px; margin-bottom: 48px; }
  .links { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .link-card {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px;
    text-decoration: none; transition: all 0.2s;
    text-align: left;
  }
  .link-card:hover { border-color: var(--primary); transform: translateY(-2px); }
  .link-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(0, 191, 166, 0.1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .link-text { flex: 1; }
  .link-title { color: var(--text); font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .link-sub { color: var(--text3); font-size: 12px; }
  .link-arrow { color: var(--primary); font-size: 20px; }
  .footer { color: var(--text3); font-size: 12px; margin-top: 32px; }
  .footer a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

<h1><span>Trekxi</span></h1>
<p class="tagline">Every place, every story</p>

<div class="links">
  <a href="./privacy-policy.html" class="link-card">
    <div class="link-icon">🔒</div>
    <div class="link-text">
      <div class="link-title">Politique de confidentialité</div>
      <div class="link-sub">Privacy Policy · FR + EN</div>
    </div>
    <div class="link-arrow">→</div>
  </a>

  <a href="./terms-of-use.html" class="link-card">
    <div class="link-icon">📄</div>
    <div class="link-text">
      <div class="link-title">Conditions d'utilisation</div>
      <div class="link-sub">Terms of Use · FR + EN</div>
    </div>
    <div class="link-arrow">→</div>
  </a>
</div>

<p class="footer">
  Contact : <a href="mailto:amineelmahlali5@gmail.com">amineelmahlali5@gmail.com</a><br>
  Mise à jour : 18 avril 2026
</p>

</div>
</body>
</html>
